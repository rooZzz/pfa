name: Deploy on release

on:
  release:
    types: [published]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - env:
          GH_TOKEN: ${{ secrets.DEPLOY_DISPATCH_TOKEN }}
          DEPLOY_REPO: ${{ secrets.DEPLOY_REPO }}
        run: |
          gh workflow run deploy.yml \
            --repo "$DEPLOY_REPO" \
            --ref main \
            -f project=pfa \
            -f source_ref="${{ github.event.release.tag_name }}"
