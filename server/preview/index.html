<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="color-scheme" content="light dark" />
    <title>pfa widget preview</title>
    <style>
      body {
        margin: 0;
        background: #1c1a17;
        color: #d8d4ce;
        font:
          13px/1.4 system-ui,
          sans-serif;
      }
      #controls {
        position: sticky;
        top: 0;
        z-index: 1;
        display: flex;
        gap: 16px;
        align-items: center;
        padding: 10px 16px;
        background: #26231f;
        border-bottom: 1px solid #3a362f;
      }
      #controls button {
        font: inherit;
        padding: 4px 10px;
        border: 1px solid #4a453d;
        border-radius: 5px;
        background: transparent;
        color: inherit;
        cursor: pointer;
      }
      #controls button.active {
        background: #4a453d;
        color: #fff;
      }
      #frames {
        display: flex;
        flex-wrap: wrap;
        gap: 24px;
        align-items: flex-start;
        padding: 24px;
      }
      .frame-cell {
        flex: 0 0 auto;
      }
      .frame-cell .frame-label {
        font-family: ui-monospace, monospace;
        font-size: 11px;
        color: #8d877d;
        margin-bottom: 6px;
      }
      .frame-cell iframe {
        display: block;
        border: 1px solid #3a362f;
        border-radius: 6px;
        background: #1c1a17;
        width: 100%;
        height: 480px;
      }
    </style>
  </head>
  <body>
    <div id="controls"></div>
    <div id="frames"></div>
    <script type="module" src="/main.ts"></script>
  </body>
</html>
